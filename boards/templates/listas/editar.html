{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-md-5 col-lg-4">

        <a href="javascript:history.back()" style="color:#60a5fa;text-decoration:none;font-size:0.9rem;display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;transition:0.2s;">
            <i class="bi bi-arrow-left"></i> Volver
        </a>

        <div class="card shadow" style="background:rgba(17,24,39,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:36px;">

            <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#d97706,#b45309);display:flex;justify-content:center;align-items:center;font-size:1.4rem;margin-bottom:14px;box-shadow:0 8px 20px rgba(180,83,9,0.4);">
                ✏️
            </div>

            <h2 style="color:white;font-weight:bold;margin-bottom:4px;">Editar Lista</h2>
            <p style="color:#9ca3af;font-size:0.9rem;margin-bottom:26px;">Cambiá el nombre de esta lista</p>

            <style>
                label { color:#d1d5db; margin-bottom:5px; font-size:0.88rem; font-weight:500; display:block; }
                input[type=text] { background:#1f2937 !important; border:1px solid #374151 !important; color:white !important; border-radius:12px !important; padding:11px 14px !important; width:100%; }
                input[type=text]:focus { border-color:#3b82f6 !important; box-shadow:0 0 0 0.2rem rgba(59,130,246,0.25) !important; outline:none !important; }
                ul.errorlist { list-style:none; padding:0; margin:4px 0 0; }
                ul.errorlist li { color:#f87171; font-size:0.82rem; }
            </style>

            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom:18px;">
                    <label><i class="bi bi-card-list" style="color:#60a5fa"></i> Nombre de la lista</label>
                    {{ form.nombre }}
                    {% if form.nombre.errors %}<ul class="errorlist">{% for e in form.nombre.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
                </div>

                <button style="background:linear-gradient(135deg,#d97706,#b45309);border:none;border-radius:12px;padding:13px;font-weight:bold;color:white;width:100%;transition:0.25s;cursor:pointer;font-size:1rem;"
                        onmouseover="this.style.transform='translateY(-2px)'"
                        onmouseout="this.style.transform='translateY(0)'">
                    <i class="bi bi-floppy-fill"></i>
                    Guardar Cambios
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
