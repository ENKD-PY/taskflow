<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Lista | TaskFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif;
        }
        .form-container { width:100%; max-width:440px; animation:fadeIn 0.7s ease; padding:20px; }
        .form-card {
            background: rgba(17,24,39,0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 40px;
        }
        .back-link { color:#60a5fa; text-decoration:none; font-size:0.9rem; display:inline-flex; align-items:center; gap:6px; margin-bottom:22px; transition:0.2s; }
        .back-link:hover { color:white; transform:translateX(-3px); }
        .logo-icon { width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;justify-content:center;align-items:center;font-size:1.5rem;margin-bottom:14px;box-shadow:0 8px 20px rgba(37,99,235,0.4); }
        h1 { color:white; font-size:1.7rem; font-weight:bold; margin-bottom:4px; }
        p { color:#9ca3af; margin-bottom:26px; font-size:0.9rem; }
        label { color:#d1d5db; margin-bottom:5px; font-size:0.88rem; font-weight:500; display:block; }
        input[type=text] {
            background:#1f2937 !important; border:1px solid #374151 !important;
            color:white !important; border-radius:12px !important; padding:11px 14px !important; width:100%;
        }
        input[type=text]:focus { border-color:#3b82f6 !important; box-shadow:0 0 0 0.2rem rgba(59,130,246,0.25) !important; outline:none !important; }
        ul.errorlist { list-style:none; padding:0; margin:4px 0 0; }
        ul.errorlist li { color:#f87171; font-size:0.82rem; }
        .btn-crear { background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:12px;padding:13px;font-weight:bold;color:white;width:100%;margin-top:16px;transition:0.25s;cursor:pointer;font-size:1rem; }
        .btn-crear:hover { transform:translateY(-2px); box-shadow:0 10px 20px rgba(37,99,235,0.4); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<div class="form-container">

    <a href="javascript:history.back()" class="back-link">
        <i class="bi bi-arrow-left"></i> Volver al board
    </a>

    <div class="form-card">
        <div class="logo-icon">📑</div>
        <h1>Nueva Lista</h1>
        <p>Agregá una lista a tu board</p>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom:16px;">
                <label><i class="bi bi-card-list" style="color:#60a5fa"></i> Nombre de la lista</label>
                {{ form.nombre }}
                {% if form.nombre.errors %}<ul class="errorlist">{% for e in form.nombre.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
            </div>
            <button class="btn-crear">
                <i class="bi bi-plus-circle-fill"></i>
                Crear Lista
            </button>
        </form>
    </div>
</div>
</body>
</html>
