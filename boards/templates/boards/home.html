<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>TaskFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h1>
            🚀 TaskFlow
        </h1>

        <div>

            <span class="me-3">
                👤 {{ request.user.username }}
            </span>

            <a href="/logout/" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

    <a href="/crear-board/" class="btn btn-success mb-4">
        ➕ Nuevo Tablero
    </a>

    <div class="row">

        {% for board in boards %}

        <div class="col-md-4">

            <div class="card shadow mb-4">

                <div class="card-body">

                    <h3>{{ board.nombre }}</h3>

                    <a
                        href="/editar-board/{{ board.id }}/"
                        class="btn btn-primary btn-sm">
                        Editar
                    </a>

                    <a
                        href="/eliminar-board/{{ board.id }}/"
                        class="btn btn-danger btn-sm">
                        Eliminar
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <p>No tienes tableros.</p>

        {% endfor %}

    </div>

</div>

</body>
</html>
