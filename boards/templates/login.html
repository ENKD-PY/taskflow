<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login | TaskFlow</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body {

            min-height: 100vh;

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b,
                    #111827
                );

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            font-family: Arial, sans-serif;

        }

        .login-container {

            width: 100%;
            max-width: 430px;

            animation: fadeIn 0.7s ease;

        }

        .login-card {

            background: rgba(17, 24, 39, 0.95);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 24px;

            backdrop-filter: blur(12px);

            box-shadow:
                0 20px 50px rgba(0,0,0,0.5);

            padding: 40px;

        }

        .logo {

            width: 80px;
            height: 80px;

            border-radius: 20px;

            background: linear-gradient(
                135deg,
                #3b82f6,
                #2563eb
            );

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 2rem;

            margin: auto;

            margin-bottom: 20px;

            box-shadow:
                0 10px 30px rgba(37,99,235,0.5);

        }

        .title {

            text-align: center;

            font-size: 2rem;

            font-weight: bold;

            color: white;

        }

        .subtitle {

            text-align: center;

            color: #9ca3af;

            margin-bottom: 30px;

        }

        label {

            color: #d1d5db;

            margin-bottom: 8px;

        }

        input {

            background: #1f2937 !important;

            border: 1px solid #374151 !important;

            color: white !important;

            border-radius: 12px !important;

            padding: 12px !important;

        }

        input:focus {

            border-color: #3b82f6 !important;

            box-shadow:
                0 0 0 0.2rem rgba(59,130,246,0.25) !important;

        }

        .btn-login {

            background: linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            border: none;

            border-radius: 12px;

            padding: 12px;

            font-weight: bold;

            transition: 0.25s;

        }

        .btn-login:hover {

            transform: translateY(-2px);

            box-shadow:
                0 10px 20px rgba(37,99,235,0.4);

        }

        .register-link {

            color: #9ca3af;

            text-align: center;

            margin-top: 20px;

        }

        .register-link a {

            color: #60a5fa;

            text-decoration: none;

            font-weight: bold;

        }

        .register-link a:hover {

            color: white;

        }

        @keyframes fadeIn {

            from {

                opacity: 0;
                transform: translateY(20px);

            }

            to {

                opacity: 1;
                transform: translateY(0);

            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">

            🚀

        </div>

        <h1 class="title">

            TaskFlow

        </h1>

        <p class="subtitle">

            Organiza tus tareas como un profesional

        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Usuario
                </label>

                {{ form.username }}

            </div>

            <div class="mb-4">

                <label>
                    Contraseña
                </label>

                {{ form.password }}

            </div>

            <button class="btn btn-login w-100 text-white">

                <i class="bi bi-box-arrow-in-right"></i>

                Iniciar Sesión

            </button>

        </form>

        <div class="register-link">

            ¿No tienes cuenta?

            <a href="/register/">

                Crear cuenta

            </a>

        </div>

    </div>

</div>

</body>

</html>
